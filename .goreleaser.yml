---
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=jcroql
# GoReleaser configuration
# Documentation: https://goreleaser.com/customization/
version: 2

# Set the project name
project_name: a

# Clean dist folder before build
before:
  hooks:
    - go mod tidy
    - go generate ./...

# Build configuration
builds:
  - id: a
    main: .
    binary: a

    # Custom ldflags. version is a package-level var in main so -X can set it;
    # commit/date/builtBy were dropped as they were never surfaced anywhere.
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

    # Build for multiple platforms
    goos:
      - linux
      - darwin
      - freebsd
      - openbsd
      - netbsd

    goarch:
      - amd64
      - arm64
      - arm
      - "386"

    goarm:
      - "6"
      - "7"

    # Skip certain combinations
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: darwin
        goarch: arm
      - goos: freebsd
        goarch: arm
      - goos: openbsd
        goarch: arm
      - goos: netbsd
        goarch: arm

    # Set environment variables
    env:
      - CGO_ENABLED=0

    # Custom build tags
    tags:
      - netgo
      - osusergo

# Archive configuration
archives:
  - id: a
    formats: ["binary", "tar.gz"]

    # Archive format
    format_overrides:
      - goos: windows
        formats: [zip]

    # Files to include in archive
    files:
      - LICENSE.md
      - README.md
      - docs/*

# Checksum configuration
checksum:
  name_template: "checksums.txt"
  algorithm: sha256

# Keyless-sign the checksums file with cosign via Sigstore (Fulcio + Rekor). The
# OIDC identity comes from the workflow's id-token; no long-lived keys are stored.
signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

# Generate SBOMs for the release archives with syft.
sboms:
  - id: archive
    artifacts: archive

# Snapshot configuration
snapshot:
  version_template: "{{ incpatch .Version }}-next"

# Release configuration
release:
  github:
    owner: ivuorinen
    name: a

  # Release notes
  header: |
    ## a v{{ .Version }} ({{ .Date }})

    A robust command-line interface (CLI) wrapper around the age encryption tool

  footer: |
    ## Installation

    ### Using Go
    ```bash
    go install github.com/ivuorinen/a@latest
    ```

    ### Manual Download
    Download the appropriate binary for your platform from the assets below.

    ## Documentation

    See the [README](https://github.com/ivuorinen/a#readme) for usage instructions.

  # Automatically generate release notes

  make_latest: true

# Changelog configuration
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "typo"
      - "Merge pull request"
      - "Merge branch"
  groups:
    - title: "🚀 Features"
      regexp: "^feat"
    - title: "🐛 Bug Fixes"
      regexp: "^fix"
    - title: "🔒 Security"
      regexp: "^security"
    - title: "⚡ Performance"
      regexp: "^perf"
    - title: "♻️ Refactoring"
      regexp: "^refactor"
    - title: "Other changes"

# NFPM configuration for Linux packages
nfpms:
  - id: a
    package_name: a
    vendor: ivuorinen
    homepage: https://github.com/ivuorinen/a
    maintainer: ivuorinen
    description: Modern, secure Go-based CLI tool for managing Fail2Ban jails and bans
    license: MIT

    formats:
      - deb
      - rpm
      - apk

    bindir: /usr/bin

    contents:
      - src: ./LICENSE.md
        dst: /usr/share/doc/a/LICENSE.md
      - src: ./README.md
        dst: /usr/share/doc/a/README.md

# Docker configuration
dockers:
  - image_templates:
      - "ghcr.io/ivuorinen/a:{{ .Tag }}"
      - "ghcr.io/ivuorinen/a:v{{ .Major }}"
      - "ghcr.io/ivuorinen/a:v{{ .Major }}.{{ .Minor }}"
      - "ghcr.io/ivuorinen/a:latest"

    dockerfile: Dockerfile

    build_flag_templates:
      - "--pull"
      - "--label=org.opencontainers.image.created={{.Date}}"
      - "--label=org.opencontainers.image.title={{.ProjectName}}"
      - "--label=org.opencontainers.image.revision={{.FullCommit}}"
      - "--label=org.opencontainers.image.version={{.Version}}"
      - "--label=org.opencontainers.image.source={{.GitURL}}"
      - "--platform=linux/amd64"

# Announce releases
announce:
  skip: false
