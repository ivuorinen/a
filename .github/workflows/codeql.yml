---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "CodeQL"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "30 1 * * 0"
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read # read workflow run metadata for the Actions CodeQL analysis
      contents: read # check out the repository
      packages: read # pull internal packages during the build
      security-events: write # upload CodeQL results to code scanning
    strategy:
      fail-fast: false
      matrix:
        language: ["actions", "go"]
    steps:
      - name: CodeQL Analysis
        uses: ivuorinen/actions/codeql-analysis@de31e11dda6488eabe95e951ebb61c6d9d500865 # v2026.06.30
        with:
          language: ${{ matrix.language }}
          queries: security-and-quality
